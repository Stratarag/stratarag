name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: py${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        include:
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # The core has zero dependencies: install nothing, prove it works bare.
      - name: Run test suite (stdlib only)
        run: python -m unittest discover -s tests -v
      - name: Byte-compile everything
        run: python -m compileall -q stratarag tests examples

  package:
    name: build & validate distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - name: Install the wheel into a clean venv and smoke-test
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install dist/*.whl
          /tmp/venv/bin/python -c "
          import stratarag as sr
          kb = sr.Knowledge.from_texts(['Refund window is 14 days.'])
          out = sr.Agent(model='echo', knowledge=kb).run('refund window?').output
          assert '14 days' in out, out
          print('wheel smoke test OK:', sr.__version__)"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
